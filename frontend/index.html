<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; }
        #message { font-size: 1.2rem; color: #0066cc; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Message du backend :</h1>
        <div id="message">Chargement...</div>
    </div>

    <script>
        fetch('/api/message')
            .then(response => response.json())
            .then(data => {
                document.getElementById('message').textContent = data.message;
            })
            .catch(error => {
                console.error('Erreur:', error);
                document.getElementById('message').textContent = 'Erreur de connexion au backend';
                document.getElementById('message').style.color = 'red';
            });
    </script>
</body>
</html>
